<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Google Sheets CSV URL (replace with your published CSV URL)
        const SHEET_CSV_URL = atob('aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMXRDM0kwcmFlSUJIZm1hZFlSWVUwQkxoX25TajFFc0NDRFM5QTZDNWxnZGsvZXhwb3J0P2Zvcm1hdD1jc3YmZ2lkPTE3OTA0ODIzNzY=');
        const NOTES_CSV_URL = atob('aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMXRDM0kwcmFlSUJIZm1hZFlSWVUwQkxoX25TajFFc0NDRFM5QTZDNWxnZGsvZXhwb3J0P2Zvcm1hdD1jc3YmZ2lkPTIwNDkwMjI2Mzg=');

        function App() {
            const [universities, setUniversities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filters, setFilters] = useState(() => {
                // Load filters from sessionStorage on initial render
                const savedFilters = sessionStorage.getItem('exchangeFilters');
                if (savedFilters) {
                    try {
                        return JSON.parse(savedFilters);
                    } catch (e) {
                        console.error('Failed to parse saved filters:', e);
                    }
                }
                return {
                    studentType: '', // 'Undergraduate' or 'Graduate'
                    languageRegion: '',
                    semesterOption: '',
                    continent: '',
                    country: '',
                    university: '',
                    universitySearch: '',
                    gpa: '',
                    toefl: '',
                    nonEnglishLanguage: '',
                    nonEnglishScore: '',
                    uicExclusive: false,
                    uicExclude: false,
                    scholarshipOnly: false,
                    updateOnly: false,
                };
            });
            const [sortBy, setSortBy] = useState(() => {
                // Load sortBy from sessionStorage on initial render
                return sessionStorage.getItem('exchangeSortBy') || 'quota-desc';
            });
            const [favorites, setFavorites] = useState([]);
            const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
            const [selectedUniversity, setSelectedUniversity] = useState(null);
            const [gpaWarning, setGpaWarning] = useState('');
            const [toeflWarning, setToeflWarning] = useState('');
            const [showScrollTop, setShowScrollTop] = useState(false);
            const [showUpdateHistory, setShowUpdateHistory] = useState(false);
            const [cameFromUpdateHistory, setCameFromUpdateHistory] = useState(false);

            // Handle scroll to top button visibility
            useEffect(() => {
                const handleScroll = () => {
                    if (window.pageYOffset > 300) {
                        setShowScrollTop(true);
                    } else {
                        setShowScrollTop(false);
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Scroll to top function
            const scrollToTop = () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            };

            // Save filters to sessionStorage whenever they change
            useEffect(() => {
                sessionStorage.setItem('exchangeFilters', JSON.stringify(filters));
            }, [filters]);

            // Save sortBy to sessionStorage whenever it changes
            useEffect(() => {
                sessionStorage.setItem('exchangeSortBy', sortBy);
            }, [sortBy]);

            // Reset language-specific filters when languageRegion changes
            useEffect(() => {
                if (filters.languageRegion === 'English') {
                    // Clear non-English language filters when switching to English
                    setFilters(prev => ({
                        ...prev,
                        nonEnglishLanguage: '',
                        nonEnglishScore: ''
                    }));
                } else if (filters.languageRegion === 'Non-English') {
                    // Clear TOEFL filter when switching to Non-English
                    setFilters(prev => ({
                        ...prev,
                        toefl: ''
                    }));
                } else if (filters.languageRegion === 'Both') {
                    // Clear all language-specific filters when Both is selected
                    setFilters(prev => ({
                        ...prev,
                        toefl: '',
                        nonEnglishLanguage: '',
                        nonEnglishScore: ''
                    }));
                } else {
                    // Clear all language-specific filters when no region is selected
                    setFilters(prev => ({
                        ...prev,
                        toefl: '',
                        nonEnglishLanguage: '',
                        nonEnglishScore: ''
                    }));
                }
            }, [filters.languageRegion]);

            // Load data from Google Sheets
            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    setLoading(true);
                    
                    // Load university data and notes data in parallel
                    const [uniResponse, notesResponse] = await Promise.all([
                        fetch(SHEET_CSV_URL),
                        fetch(NOTES_CSV_URL)
                    ]);
                    
                    const uniCsvText = await uniResponse.text();
                    const notesCsvText = await notesResponse.text();
                    
                    // Parse notes data first and wait for completion

                const num = parseFloat(str);
                
                // Return 0 if not a valid number

                // Return the number as-is (could be decimal like 2.5)

                        const lang = uni.additionalLanguage?.toLowerCase() || '';
                        if (!lang.includes(filters.nonEnglishScore.toLowerCase())) {

                                                    <div className="info-label">TOEFL Speaking</div>
                                                    <div className="info-value">{selectedUniversity.toeflSpeaking}</div>
                                                </div>
                                            )}
                                            {selectedUniversity.toeflWriting && (
                                                <div className="info-item">
                                                    <div className="info-label">TOEFL Writing</div>
                                                    <div className="info-value">{selectedUniversity.toeflWriting}</div>
                                                </div>
                                            )}
                                            <div className="info-item">
                                                <div className="info-label">Subscores Requirements</div>
                                                <div className="info-value">{selectedUniversity.toeflsubscores || 'Not specified'}</div>
                                            </div>
                                            <div className="info-item">
                                                <div className="info-label">GPA Required (4.3 scale)</div>
                                                <div className="info-value">{selectedUniversity.gpaRequired || 'Not specified'}</div>
                                            </div>
                                            {selectedUniversity.additionalLanguage && selectedUniversity.additionalLanguage !== 'N/A' && (
                                                <div className="info-item">
                                                    <div className="info-label">Additional Language</div>
                                                    <div className="info-value">{selectedUniversity.additionalLanguage}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {selectedUniversity.admissionReq && (
                                        <div className="info-section">
                                            <h3>Admission Requirements</h3>
                                            <p style={{fontSize: 14, lineHeight: 1.6}}>{linkifyText(selectedUniversity.admissionReq)}</p>
                                        </div>
                                    )}

                                    {selectedUniversity.availableStudyArea && (
                                        <div className="info-section">
                                            <h3>Available Study Areas</h3>
                                            <p style={{fontSize: 14, lineHeight: 1.6}}>{linkifyText(selectedUniversity.availableStudyArea)}</p>
                                        </div>
                                    )}

                                    {selectedUniversity.restrictedStudyArea && selectedUniversity.restrictedStudyArea !== 'N/A' && (
                                        <div className="info-section">
                                            <h3>Restricted Study Areas</h3>
                                            <p style={{fontSize: 14, lineHeight: 1.6, color: 'var(--danger)'}}>{linkifyText(selectedUniversity.restrictedStudyArea)}</p>
                                        </div>
                                    )}

                                    {selectedUniversity.additionalInfoLink && selectedUniversity.additionalInfoLink !== 'N/A' && (
                                        <div className="info-section">
                                            <h3>Additional Info / Promotional Link</h3>
                                            <p style={{fontSize: 14, lineHeight: 1.6}}>{linkifyText(selectedUniversity.additionalInfoLink)}</p>
                                        </div>
                                    )}

                                    <div className="info-section">
                                        <h3>Important Dates</h3>
                                        <div className="info-grid">
                                            <div className="info-item">
                                                <div className="info-label">Spring Nomination Deadline</div>
                                                <div className="info-value">{selectedUniversity.springNominationDeadline || 'N/A'}</div>
                                            </div>
                                            <div className="info-item">
                                                <div className="info-label">Spring Application Deadline</div>
                                                <div className="info-value">{selectedUniversity.springApplicationDeadline || 'N/A'}</div>
                                            </div>
                                            <div className="info-item">
                                                <div className="info-label">Fall Nomination Deadline</div>
                                                <div className="info-value">{selectedUniversity.fallNominationDeadline || 'N/A'}</div>
                                            </div>
                                            <div className="info-item">
                                                <div className="info-label">Fall Application Deadline</div>
                                                <div className="info-value">{selectedUniversity.fallApplicationDeadline || 'N/A'}</div>
                                            </div>
                                        </div>
                                    </div>

                                    {selectedUniversity.academicCalendar && (
                                        <div className="info-section">
                                            <h3>Academic Calendar</h3>
                                            <p style={{fontSize: 14, lineHeight: 1.6}}>{linkifyText(selectedUniversity.academicCalendar)}</p>
                                        </div>
                                    )}

                                    {selectedUniversity.housingInfo && (
                                        <div className="info-section">
                                            <h3>Housing Information</h3>
                                            <p style={{fontSize: 14, lineHeight: 1.6}}>{linkifyText(selectedUniversity.housingInfo)}</p>
                                        </div>
                                    )}

                                    {(selectedUniversity.housingGuaranteed || selectedUniversity.recentFactsheet) && (
                                        <div className="info-section">
                                            <h3>Additional Information</h3>
                                            <div className="info-grid">
                                                {selectedUniversity.housingGuaranteed && (
                                                    <div className="info-item">
                                                        <div className="info-label">On-campus Housing Guaranteed?</div>
                                                        <div className="info-value">{selectedUniversity.housingGuaranteed}</div>
                                                    </div>
                                                )}
                                                {selectedUniversity.recentFactsheet && (
                                                    <div className="info-item">
                                                        <div className="info-label">Factsheet</div>
                                                        <div className="info-value">
                                                            <a 
                                                                href={selectedUniversity.recentFactsheet}
                                                                target="_blank"
                                                                rel="noopener noreferrer"
                                                                style={{color: 'var(--yonsei-light-blue)', textDecoration: 'underline'}}
                                                            >
                                                                Recent Factsheet
                                                            </a>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="modal-footer">
                                    {selectedUniversity.website && (
                                        <a 
                                            href={selectedUniversity.website}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="btn btn-primary"
                                        >
                                            Visit Website
                                        </a>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Update History Modal */}
                    {showUpdateHistory && (
                        <div className="modal-overlay" onClick={() => setShowUpdateHistory(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()} style={{maxWidth: 800, backgroundColor: 'white'}}>
                                <div className="modal-header" style={{position: 'relative'}}>
                                    <button 
                                        className="modal-close-btn"
                                        onClick={() => setShowUpdateHistory(false)}
                                        aria-label="Close"
                                    >
                                        ×
                                    </button>
                                    <h2>📋 Update History</h2>
                                </div>
                                <div className="modal-body" style={{maxHeight: '60vh', overflowY: 'auto'}}>
                                    {(() => {
                                        const updatedUniversities = universities
                                            .filter(uni => uni.labels.includes('Update') && uni.updateDate)
                                            .sort((a, b) => new Date(b.updateDate) - new Date(a.updateDate))
                                            .slice(0, 100);
                                        
                                        if (updatedUniversities.length === 0) {
                                            return <p style={{textAlign: 'center', color: 'var(--gray-500)', padding: 40}}>No update history available.</p>;
                                        }
                                        
                                        return (
                                            <table style={{width: '100%', borderCollapse: 'collapse', fontSize: 14}}>
                                                <thead>
                                                    <tr style={{borderBottom: '2px solid var(--gray-300)', textAlign: 'left'}}>
                                                        <th style={{padding: '12px 8px', width: '120px'}}>Date</th>
                                                        <th style={{padding: '12px 8px'}}>University</th>
                                                        <th style={{padding: '12px 8px'}}>Region</th>
                                                        <th style={{padding: '12px 8px'}}>Description</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {updatedUniversities.map((uni, index) => (
                                                        <tr 
                                                            key={index} 
                                                            style={{borderBottom: '1px solid var(--gray-200)', cursor: 'pointer'}}
                                                            onClick={() => {
                                                                setShowUpdateHistory(false);
                                                                setSelectedUniversity(uni);
                                                                setCameFromUpdateHistory(true);
                                                            }}
                                                            onMouseEnter={e => e.currentTarget.style.backgroundColor = 'var(--gray-100)'}
                                                            onMouseLeave={e => e.currentTarget.style.backgroundColor = 'transparent'}
                                                        >
                                                            <td style={{padding: '12px 8px', color: 'var(--gray-500)'}}>{uni.updateDate}</td>
                                                            <td style={{padding: '12px 8px', color: 'var(--yonsei-blue)', fontWeight: 600}}>{uni.name}</td>
                                                            <td style={{padding: '12px 8px'}}>{uni.country || '-'}</td>
                                                            <td style={{padding: '12px 8px'}}>{uni.updateDescription || '-'}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        );
                                    })()}
                                </div>
                                <div className="modal-footer">
                                    <button 
                                        className="btn btn-secondary"
                                        onClick={() => setShowUpdateHistory(false)}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Scroll to Top Button */}
                    <button 
                        className={`scroll-to-top ${showScrollTop ? 'visible' : ''}`}
                        onClick={scrollToTop}
                        aria-label="Scroll to top"
                    >
                        ↑
                    </button>

                    {/* Footer */}
                    <div className="footer">
                        <p>©2025 Seo-Ah Choi, Yonsei University, Office of International Affairs. All rights reserved.</p>
                    </div>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
